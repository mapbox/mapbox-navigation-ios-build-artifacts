name: MapboxNavigationSample
options:
  bundleIdPrefix: com.example.mapbox
  deploymentTarget:
    iOS: "14.0"
  createIntermediateGroups: true
  groupSortPosition: top

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_STYLE: Automatic
    CODE_SIGNING_ALLOWED: "NO"
    CODE_SIGNING_REQUIRED: "NO"
    IPHONEOS_DEPLOYMENT_TARGET: "14.0"
  configs:
    Debug:
      SWIFT_OPTIMIZATION_LEVEL: "-Onone"
    Release:
      SWIFT_OPTIMIZATION_LEVEL: "-O"

packages:
  MapboxNavigation:
    path: ..

targets:
  MapboxNavigationSample:
    type: application
    platform: iOS
    deploymentTarget: "14.0"
    sources:
      - path: MapboxNavigationSample
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.mapbox.navigationsample
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: MapboxNavigationSample/Info.plist
        TARGETED_DEVICE_FAMILY: "1,2"
        ENABLE_USER_SCRIPT_SANDBOXING: "NO"
    dependencies:
      - package: MapboxNavigation
        product: MapboxNavigationCore
      - package: MapboxNavigation
        product: MapboxNavigationUIKit
      - package: MapboxNavigation
        product: MapboxDirections
      - package: MapboxNavigation
        product: MapboxNavigationCustomRoute
